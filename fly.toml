# fly.toml — Fly.io deployment configuration for work-server.
# Deploy with: fly deploy
#
# Required secrets (set via `fly secrets set`):
#   WORK_HUMAN   — display name of the human operator
#   WORK_API_KEY — API key for bearer auth
#   DATABASE_URL — Neon (or any Postgres) DSN

app = "lovyou-work-server"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
