name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: hive

      # Checkout sibling repos (go.mod replace directives point to ../agent, ../work, ../eventgraph/go)
      - uses: actions/checkout@v4
        with:
          repository: transpara-ai/eventgraph
          path: eventgraph
      - uses: actions/checkout@v4
        with:
          repository: transpara-ai/agent
          path: agent
      - uses: actions/checkout@v4
        with:
          repository: transpara-ai/work
          path: work

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: hive/go.sum

      - run: go build ./...
        working-directory: hive

      - run: go test ./... -count=1 -short
        working-directory: hive
